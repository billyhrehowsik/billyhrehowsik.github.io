[build]
  command = "echo 'No build needed - static site'"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NETLIFY_USE_YARN = "false" }

[[headers]]
  for = "/webbuild/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
