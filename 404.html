<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Billy Hrehowsik</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: var(--space-2xl);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: var(--space-lg);
        }

        .error-title {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--space-md);
        }

        .error-description {
            font-size: var(--font-size-lg);
            color: var(--text-secondary);
            margin-bottom: var(--space-2xl);
            max-width: 600px;
        }

        .error-actions {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 640px) {
            .error-code {
                font-size: 4rem;
            }

            .error-title {
                font-size: var(--font-size-xl);
            }

            .error-actions {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" aria-label="Main navigation">
        <div class="container">
            <div class="nav-brand">
                <a href="/" class="nav-brand-link">
                    <span class="nav-brand-icon">BR</span>
                    <span class="nav-brand-text">Billy Hrehowsik</span>
                </a>
            </div>
        </div>
    </nav>

    <main id="main-content">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
                Sorry, the page you're looking for doesn't exist or has been moved.
                Don't worry, you can navigate back to my portfolio using the button below.
            </p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">Back to Home</a>
                <a href="/#projects" class="btn btn-secondary">View Projects</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 Billy Hrehowsik. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/js/script.js" defer></script>
</body>
</html>
